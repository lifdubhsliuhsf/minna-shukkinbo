<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>新規登録 - みんなの出勤簿</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#1a1a1a">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
<div class="max-w-sm mx-auto pt-16 px-4">
  <h1 class="text-2xl font-bold mb-6 text-center">新規登録</h1>
  <form id="registerForm" class="bg-white p-6 rounded-lg shadow space-y-4">
    <div>
      <label class="block text-sm text-gray-600 mb-1">表示名</label>
      <input type="text" name="name" required maxlength="50" autocomplete="name"
        class="w-full border border-gray-300 rounded px-3 py-2" placeholder="田中太郎">
    </div>
    <div>
      <label class="block text-sm text-gray-600 mb-1">メールアドレス</label>
      <input type="email" name="email" required autocomplete="email"
        class="w-full border border-gray-300 rounded px-3 py-2" placeholder="example@mail.com">
    </div>
    <div>
      <label class="block text-sm text-gray-600 mb-1">パスワード（6文字以上）</label>
      <input type="password" name="password" required minlength="6" autocomplete="new-password"
        class="w-full border border-gray-300 rounded px-3 py-2">
    </div>
    <div>
      <label class="block text-sm text-gray-600 mb-1">パスワード確認</label>
      <input type="password" name="password_c" required minlength="6" autocomplete="new-password"
        class="w-full border border-gray-300 rounded px-3 py-2">
    </div>
    <button id="submitBtn" class="w-full bg-black text-white py-2 rounded font-bold disabled:bg-gray-400 disabled:cursor-not-allowed">登録</button>
    <div id="err" class="text-red-600 text-sm hidden"></div>
    <div class="text-[11px] text-gray-500">※ 最初に登録した人が <b>office</b>(管理者) になります。それ以降は <b>staff</b> 権限で登録され、office が後から昇格できます。</div>
  </form>
  <div class="text-center mt-4">
    <a href="/login" class="text-sm text-gray-500 underline">ログインに戻る</a>
  </div>
</div>
<script type="module">
  import {
    auth, db, createUserWithEmailAndPassword, updateProfile,
    ref, set, serverTimestamp, runTransaction
  } from '/js/firebase-init.js';
  import { redirectIfAuthed } from '/js/auth-guard.js';
  redirectIfAuthed('/punch');

  async function maybeAssignFirstOffice(uid) {
    const flagRef = ref(db, 'meta/firstOfficeUid');
    const tx = await runTransaction(flagRef, (cur) => cur ? undefined : uid);
    return tx.committed && tx.snapshot.val() === uid;
  }

  const form = document.getElementById('registerForm');
  const err = document.getElementById('err');
  const submitBtn = document.getElementById('submitBtn');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.classList.add('hidden');
    const fd = new FormData(form);
    if (fd.get('password') !== fd.get('password_c')) {
      err.textContent = 'パスワードが一致しません'; err.classList.remove('hidden'); return;
    }
    submitBtn.disabled = true; submitBtn.textContent = '登録中…';
    window.__suppressAuthRedirect = true;
    try {
      const name = fd.get('name').trim();
      const email = fd.get('email').trim();
      const cred = await createUserWithEmailAndPassword(auth, email, fd.get('password'));
      await updateProfile(cred.user, { displayName: name });
      let role = 'staff';
      try { if (await maybeAssignFirstOffice(cred.user.uid)) role = 'office'; } catch (_) {}
      await set(ref(db, `users/${cred.user.uid}`), {
        name, email, role,
        color_index: Math.floor(Math.random() * 7),
        created_at: serverTimestamp(),
        updated_at: serverTimestamp()
      });
      location.href = '/punch';
    } catch (ex) {
      window.__suppressAuthRedirect = false;
      submitBtn.disabled = false; submitBtn.textContent = '登録';
      err.textContent = ex.code === 'auth/email-already-in-use'
        ? 'このメールアドレスは既に登録されています'
        : '登録失敗: ' + (ex.code || ex.message);
      err.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
