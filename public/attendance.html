<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>みんなの出勤簿</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .alert-cell { background: #fee2e2; color: #991b1b; font-weight: 700; }
    .alert-row  { background: #fef3c7; }
    .holiday-row{ background: #f3f4f6; color: #6b7280; }
    .incomplete { background: #fef08a; }
    .edited-row { background: #dbeafe; }
    table.att { border-collapse: collapse; width: 100%; font-size: 12px; }
    table.att th, table.att td { border: 1px solid #e5e7eb; padding: 4px 6px; text-align: right; white-space: nowrap; }
    table.att th { background: #f9fafb; font-weight: 600; }
    table.att td.left, table.att th.left { text-align: left; }
    .ed-input { width: 60px; font-size: 11px; padding: 1px 4px; border: 1px solid #d1d5db; border-radius: 3px; text-align: right; }
    .flash { position: fixed; top: 0.5rem; left: 50%; transform: translateX(-50%); padding: 0.5rem 1rem; border: 1px solid; border-radius: 4px; box-shadow: 0 6px 16px rgba(0,0,0,.15); z-index: 50; }
    .flash-ok { background: #dcfce7; color: #166534; border-color: #86efac; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen pb-20">
<div id="app" class="max-w-5xl mx-auto pb-10">
  <header class="sticky top-0 z-10 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center">
      <h1 class="font-bold text-base">📊 社労士書類生成</h1>
    </div>
    <div class="flex items-center gap-3">
      <span id="meLabel" class="text-xs text-gray-500"></span>
    </div>
  </header>

  <main class="px-3 py-3 space-y-4">
    <!-- ① 月選択 -->
    <section class="bg-white rounded shadow-sm border border-gray-200 p-4 space-y-2">
      <div class="text-sm font-semibold">① 対象月を選んで生成</div>
      <div class="flex items-center gap-2 flex-wrap">
        <input id="ymInput" type="month" class="border border-gray-300 rounded px-3 py-1.5 text-sm">
        <button id="genBtn" class="text-xs bg-gray-900 text-white px-3 py-1.5 rounded font-bold">📊 生成</button>
        <span id="genStatus" class="text-xs text-gray-500"></span>
      </div>
      <div class="text-[11px] text-gray-500"><code>/punch</code> で記録された打刻データから出勤簿を集計し、社労士提出用xlsxを生成します。</div>
      <div id="errorBox" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2"></div>
    </section>

    <!-- ② 過去の月 -->
    <section class="bg-white rounded shadow-sm border border-gray-200 p-4 space-y-2">
      <div class="text-sm font-semibold">② 過去の出勤簿</div>
      <div id="monthsList" class="text-sm text-gray-500">読み込み中…</div>
    </section>

    <!-- サマリ -->
    <section id="summarySection" class="hidden bg-white rounded shadow-sm border border-gray-200 p-4 space-y-3">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <h2 class="font-bold">
          <span id="ymLabel"></span> サマリ
          <span id="countLabel" class="text-xs text-gray-500 font-normal"></span>
        </h2>
        <div class="flex gap-2">
          <button id="downloadAllBtn" class="text-sm bg-gray-900 text-white px-3 py-1.5 rounded">全員分ダウンロード (xlsx)</button>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="att" id="summaryTable">
          <thead>
            <tr>
              <th class="left">#</th>
              <th class="left">氏名</th>
              <th class="left">部門</th>
              <th>労働時間</th>
              <th>残業時間</th>
              <th>深夜</th>
              <th class="left">アラート</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>
    </section>

    <!-- 個人詳細 -->
    <section id="detailSection" class="hidden bg-white rounded shadow-sm border border-gray-200 p-4 space-y-3">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <button id="backToSummary" class="text-sm text-gray-500 mr-2">← 一覧へ</button>
          <span id="personLabel" class="font-bold"></span>
        </div>
        <button id="downloadOneBtn" class="text-sm bg-gray-900 text-white px-3 py-1.5 rounded">このシートだけダウンロード</button>
      </div>
      <div id="personAlerts" class="text-sm"></div>
      <div class="text-xs text-gray-500">出勤/退勤セルをクリックで編集。空欄+保存で編集クリア。</div>
      <div class="overflow-x-auto">
        <table class="att" id="detailTable">
          <thead>
            <tr>
              <th class="left">日付</th>
              <th>出勤</th>
              <th>退勤</th>
              <th>休憩</th>
              <th>労働時間</th>
              <th>残業</th>
              <th>深夜</th>
              <th>週残業累計</th>
              <th class="left">アラート</th>
              <th class="left">原打刻</th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
          <tfoot id="detailFoot"></tfoot>
        </table>
      </div>
    </section>
  </main>
</div>

<script type="module">
  import { rebuildRecordsFromRaw, exportAllToXlsx, exportOneToXlsx } from '/js/attendance.js';
  import {
    saveMonth, loadMonth, listMonths, deleteMonth,
    saveEdit, loadEdits,
    monthDataToPeople, applyEdits,
  } from '/js/attendance-store.js';
  import { requireRole } from '/js/auth-guard.js';
  import {
    db, ref, get, query, orderByChild, equalTo,
    escapeHtml, computeWorkHours
  } from '/js/firebase-init.js';
  import { renderBottomNav } from '/js/layout.js';

  const me = await requireRole(['office']);
  if (!me) throw new Error('blocked');
  document.getElementById('meLabel').textContent = me.name ? `👤 ${me.name}` : '';
  document.body.insertAdjacentHTML('beforeend', renderBottomNav('/attendance', me.role));

  const $ = (id) => document.getElementById(id);
  const state = {
    records: [], year: null, month: null,
    months: [], edits: {}, detailIdx: null,
  };

  // ---- 初期化 ----
  await refreshMonthsList();

  async function refreshMonthsList() {
    const months = await listMonths();
    state.months = months;
    const el = $('monthsList');
    if (!months.length) { el.textContent = '（まだ保存された月次データはありません）'; return; }
    el.innerHTML = months.map(m => `
      <div class="flex items-center gap-2 py-1 border-b last:border-b-0">
        <button class="load-m text-blue-600 underline text-sm" data-y="${m.year}" data-m="${m.month}">${m.year}年${m.month}月</button>
        <span class="text-xs text-gray-500">${m.count}名 / ${escapeHtml(m.filename || '(ファイル名なし)')}</span>
        <button class="del-m text-xs text-red-500 ml-auto" data-y="${m.year}" data-m="${m.month}">削除</button>
      </div>
    `).join('');
    el.querySelectorAll('.load-m').forEach(b => b.addEventListener('click', () => loadSavedMonth(+b.dataset.y, +b.dataset.m)));
    el.querySelectorAll('.del-m').forEach(b => b.addEventListener('click', async () => {
      const y = +b.dataset.y, m = +b.dataset.m;
      if (!confirm(`${y}年${m}月のデータを削除します。OK?`)) return;
      await deleteMonth(y, m); await refreshMonthsList(); flash('削除しました');
    }));
  }

  async function loadSavedMonth(year, month) {
    const data = await loadMonth(year, month);
    if (!data) { showErr('データが見つかりません'); return; }
    state.edits = await loadEdits(year, month) || {};
    const people = monthDataToPeople(data);
    applyEdits(people, state.edits);
    state.records = rebuildRecordsFromRaw(people, year, month);
    state.year = year; state.month = month;
    renderSummary();
    flash(`${year}年${month}月を読み込みました`);
  }

  async function reparseCurrent() {
    if (!state.year) return;
    await loadSavedMonth(state.year, state.month);
  }

  // 既定の対象月: 当月
  {
    const now = new Date();
    $('ymInput').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  }
  $('genBtn').addEventListener('click', generateFromRtdb);

  /** /punches → 月別 records へ集計し、saveMonth で永続化 */
  async function generateFromRtdb() {
    hideErr();
    const ym = $('ymInput').value;
    if (!ym || !/^\d{4}-\d{2}$/.test(ym)) { showErr('対象月を選択してください'); return; }
    const [year, month] = ym.split('-').map(Number);
    $('genStatus').textContent = `${year}年${month}月 を集計中…`;
    try {
      // 1. employees + punches (期間: H1 + H2) を取得
      const [empSnap, h1Snap, h2Snap] = await Promise.all([
        get(ref(db, 'employees')),
        get(query(ref(db, 'punches'), orderByChild('periodKey'), equalTo(`${ym}-H1`))),
        get(query(ref(db, 'punches'), orderByChild('periodKey'), equalTo(`${ym}-H2`))),
      ]);
      const employees = empSnap.val() || {};
      const punches = [];
      h1Snap.forEach(c => { punches.push({ id: c.key, ...c.val() }); return false; });
      h2Snap.forEach(c => { punches.push({ id: c.key, ...c.val() }); return false; });

      // 2. 既存上書きの確認
      const existing = await loadMonth(year, month);
      if (existing && !confirm(`${year}年${month}月のデータは既に保存されています。再生成して上書きしますか？`)) {
        $('genStatus').textContent = 'キャンセル（既存を読み直します）';
        await loadSavedMonth(year, month);
        return;
      }

      // 3. people 配列に変換
      const byEmp = {};
      for (const p of punches) {
        if (!byEmp[p.employeeId]) byEmp[p.employeeId] = {};
        if (!byEmp[p.employeeId][p.dateKey]) byEmp[p.employeeId][p.dateKey] = [];
        byEmp[p.employeeId][p.dateKey].push(p);
      }
      const dim = new Date(year, month, 0).getDate();
      const fmtTime = (ts) => {
        const d = new Date(ts);
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      };
      const toFracHours = (ts) => {
        const d = new Date(ts);
        return d.getHours() + d.getMinutes() / 60 + d.getSeconds() / 3600;
      };
      const people = [];
      for (const [empId, emp] of Object.entries(employees)) {
        if (emp.active === false) continue;
        const empByDate = byEmp[empId] || {};
        // 月内に1件も打刻がない人はスキップ（空のシートが大量に出るのを防ぐ）
        if (Object.keys(empByDate).length === 0) continue;
        const days = [];
        for (let d = 1; d <= dim; d++) {
          const dateKey = `${ym}-${String(d).padStart(2, '0')}`;
          const ps = empByDate[dateKey] || [];
          if (ps.length === 0) { days.push({ day: d }); continue; }
          const c = computeWorkHours(ps);
          days.push({
            day: d,
            actualInRaw:  c.firstIn ? fmtTime(c.firstIn) : '',
            actualOutRaw: c.lastOut ? fmtTime(c.lastOut) : '',
            actualIn:     c.firstIn ? toFracHours(c.firstIn) : null,
            actualOut:    c.lastOut ? toFracHours(c.lastOut) : null,
            schedIn: null, schedOut: null,
            laborHours: (c.hasIn && c.hasOut) ? c.workMs / 3600000 : null,
            _breakH: c.breakMs / 3600000,
          });
        }
        people.push({ id: empId, name: emp.name, dept: emp.dept || '', year, month, days });
      }

      if (people.length === 0) {
        $('genStatus').textContent = '';
        showErr(`${year}年${month}月 に打刻データが見つかりません。/punch で打刻してから再度生成してください。`);
        return;
      }

      // 4. 残業/深夜/週40h集計を反映
      const records = rebuildRecordsFromRaw(people, year, month);
      // 5. 実休憩時間で breakH を上書き（一律0.75h置き換え）
      for (const rec of records) {
        for (const row of rec.rows) {
          const day = (rec._rawDays || []).find(d => d.day === row.day);
          if (day && day._breakH != null) row.breakH = Math.round(day._breakH * 100) / 100;
        }
      }
      state.records = records; state.year = year; state.month = month; state.edits = {};

      // 6. /attendance/months/{ym} に保存
      await saveMonth(year, month, records, { filename: `自動生成 (${punches.length} 打刻)` }, me.id);
      renderSummary();
      await refreshMonthsList();
      $('genStatus').textContent = `✓ 生成完了（${records.length}名 / ${punches.length} 打刻）`;
      flash(`${year}年${month}月を生成・保存しました`);
    } catch (err) {
      console.error(err);
      showErr('生成エラー: ' + err.message);
      $('genStatus').textContent = '';
    }
  }

  function renderSummary() {
    $('summarySection').classList.remove('hidden');
    $('detailSection').classList.add('hidden');
    $('ymLabel').textContent = `${state.year}年${state.month}月`;
    $('countLabel').textContent = `(${state.records.length}名)`;
    const body = $('summaryBody'); body.innerHTML = '';
    state.records.forEach((r, idx) => {
      const tr = document.createElement('tr');
      const alertText = r.monthAlerts.length ? r.monthAlerts.join('／') : '';
      const anyWeek = r.rows.some(row => row.alerts.some(a => a.startsWith('週')));
      const anyIncomplete = r.rows.some(row => row.incomplete);
      const anyEdit = r.rows.some(row => row.edited);
      const flags = [];
      if (alertText) flags.push(alertText);
      if (anyWeek) flags.push('週40h超あり');
      if (anyIncomplete) flags.push('打刻漏れ');
      if (anyEdit) flags.push('編集あり');
      tr.className = flags.length ? 'alert-row' : '';
      tr.innerHTML = `
        <td class="left">${r.id}</td>
        <td class="left">${escapeHtml(r.name)}</td>
        <td class="left">${escapeHtml(r.dept || '-')}</td>
        <td>${r.totals.workH}</td>
        <td>${r.totals.overtimeH}</td>
        <td>${r.totals.nightH}</td>
        <td class="left ${flags.length ? 'alert-cell' : ''}">${escapeHtml(flags.join('／'))}</td>
        <td><button data-idx="${idx}" class="view-btn text-xs bg-gray-200 hover:bg-gray-300 px-2 py-0.5 rounded">詳細</button></td>
      `;
      body.appendChild(tr);
    });
    body.querySelectorAll('.view-btn').forEach(b => b.addEventListener('click', () => renderDetail(+b.dataset.idx)));
  }

  function renderDetail(idx) {
    const r = state.records[idx]; state.detailIdx = idx;
    $('summarySection').classList.add('hidden');
    $('detailSection').classList.remove('hidden');
    const disp = `${r.name}（${r.dept || '-'}）`;
    $('personLabel').textContent = `${disp} ${r.year}/${String(r.month).padStart(2, '0')}`;
    $('personAlerts').innerHTML = r.monthAlerts.length
      ? `<div class="text-red-700 bg-red-50 border border-red-200 rounded p-2">⚠ ${r.monthAlerts.map(escapeHtml).join('<br>')}</div>` : '';
    const body = $('detailBody'); body.innerHTML = '';
    for (const row of r.rows) {
      const tr = document.createElement('tr');
      let cls = '';
      if (row.isHoliday && row.workH === 0) cls = 'holiday-row';
      if (row.alerts.length) cls = 'alert-row';
      if (row.incomplete) cls = 'incomplete';
      if (row.status) cls = 'holiday-row';
      if (row.edited) cls = 'edited-row';
      tr.className = cls;
      const statusNote = row.status ? `<span class="text-[10px] text-gray-500 ml-1">[${row.status}]</span>` : '';
      tr.innerHTML = `
        <td class="left">${r.month}/${row.day}(${row.weekday})${statusNote}</td>
        <td><input class="ed-input in-t" data-day="${row.day}" value="${fmt(row.inH)}" placeholder="HH:MM"></td>
        <td><input class="ed-input out-t" data-day="${row.day}" value="${fmt(row.outH)}" placeholder="HH:MM"></td>
        <td>${row.breakH || ''}</td>
        <td>${row.workH || ''}</td>
        <td>${row.overtimeH || ''}</td>
        <td>${row.nightH || ''}</td>
        <td>${row.weekOTCum || ''}</td>
        <td class="left ${row.alerts.length ? 'alert-cell' : ''}">${escapeHtml(row.alerts.join('／'))}</td>
        <td class="left text-gray-500 text-[10px]">${escapeHtml(row.punches.join(' / '))}</td>
      `;
      body.appendChild(tr);
    }
    body.querySelectorAll('.ed-input').forEach(inp => {
      inp.addEventListener('change', async () => {
        const day = +inp.dataset.day;
        const tr = inp.closest('tr');
        const inV = tr.querySelector('.in-t').value.trim();
        const outV = tr.querySelector('.out-t').value.trim();
        const validTime = s => !s || /^\d{1,2}:\d{2}$/.test(s);
        if (!validTime(inV) || !validTime(outV)) { alert('HH:MM 形式で入力してください'); return; }
        if (!inV && !outV) {
          await saveEdit(r.year, r.month, r.id, day, null);
          const safeId = String(r.id).replace(/[.#$\[\]\/]/g, '_');
          if (state.edits[safeId]) delete state.edits[safeId][day];
        } else {
          await saveEdit(r.year, r.month, r.id, day, { inTime: inV, outTime: outV, note: 'manual' });
          const safeId = String(r.id).replace(/[.#$\[\]\/]/g, '_');
          state.edits[safeId] = state.edits[safeId] || {};
          state.edits[safeId][day] = { inTime: inV, outTime: outV, note: 'manual' };
        }
        recompute(); renderDetail(state.detailIdx); flash(`${r.month}/${day} 保存`);
      });
    });
    $('detailFoot').innerHTML = `
      <tr class="font-bold bg-gray-100">
        <td class="left">合計</td><td></td><td></td><td></td>
        <td>${r.totals.workH}</td>
        <td>${r.totals.overtimeH}</td>
        <td>${r.totals.nightH}</td>
        <td></td><td></td><td></td>
      </tr>`;
    $('downloadOneBtn').onclick = () => exportOneToXlsx(r);
  }

  function recompute() {
    const people = state.records.map(r => ({
      id: r.id, name: r.name, dept: r.dept,
      fullName: r.fullName, store: r.store, grade: r.grade,
      days: r._rawDays || [],
    }));
    applyEdits(people, state.edits);
    state.records = rebuildRecordsFromRaw(people, state.year, state.month);
  }

  $('backToSummary').addEventListener('click', renderSummary);
  $('downloadAllBtn').addEventListener('click', () => {
    if (!state.records.length) return;
    const fn = `出勤簿_${state.year}${String(state.month).padStart(2, '0')}.xlsx`;
    exportAllToXlsx(state.records, { filename: fn });
  });

  function fmt(h) {
    if (h == null || isNaN(h)) return '';
    const hh = Math.floor(h) % 24, mm = Math.round((h - Math.floor(h)) * 60);
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  }
  function flash(msg) {
    const el = document.createElement('div');
    el.className = 'flash flash-ok';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
  function showErr(msg) { const b = $('errorBox'); b.classList.remove('hidden'); b.textContent = msg; }
  function hideErr() { $('errorBox').classList.add('hidden'); }
</script>
</body>
</html>
