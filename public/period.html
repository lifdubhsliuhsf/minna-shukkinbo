<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>期間集計 - みんなの出勤簿</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .matrix-table { border-collapse: separate; border-spacing: 0; }
    .matrix-table th, .matrix-table td {
      border-right: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      padding: 6px 8px; font-size: 12px; white-space: nowrap;
    }
    .matrix-table thead th {
      position: sticky; top: 0; background: #f9fafb; z-index: 2; font-weight: 600;
    }
    .matrix-table tbody th {
      position: sticky; left: 0; background: #fff; z-index: 1;
      text-align: left; font-weight: 500;
    }
    .matrix-table thead th.corner { left: 0; z-index: 3; }
    .cell-sunday { background: #fee2e2; }
    .cell-saturday { background: #dbeafe; }
    .cell-present { background: #dcfce7; }
    .cell-warn { background: #fef3c7; }
    .cell-missing { color: #9ca3af; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen pb-20">
<div id="app" class="max-w-full mx-auto"></div>

<script type="module">
  import {
    db, ref, onValue, query, orderByChild, equalTo,
    periodKeyFromDate, periodRange, currentPeriodKey, dateKeyJST, fmtHHmm, escapeHtml,
    computeWorkHours, msToHours
  } from '/js/firebase-init.js';
  import { requireAuth } from '/js/auth-guard.js';
  import { renderHeader, renderBottomNav, showFlash } from '/js/layout.js';

  const me = await requireAuth();

  const urlParams = new URLSearchParams(location.search);
  let currentKey = urlParams.get('period') || currentPeriodKey();

  document.getElementById('app').innerHTML = `
    ${renderHeader('📅 期間集計')}
    <main class="px-4 py-4">
      <div class="flex items-center gap-2 mb-3 flex-wrap">
        <button id="prevBtn"  class="px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50">← 前期間</button>
        <div id="periodLabel" class="font-bold text-lg">—</div>
        <button id="nextBtn"  class="px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50">次期間 →</button>
        <button id="todayBtn" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50">今期間</button>
        <div class="flex-1"></div>
        <button id="csvBtn" class="px-3 py-1.5 bg-green-600 text-white rounded text-sm hover:bg-green-700 font-bold">⇩ CSV出力</button>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">
        <div class="bg-white rounded border border-gray-200 p-3">
          <div class="text-xs text-gray-500">対象社員</div>
          <div id="cardEmpCount" class="text-xl font-bold">—</div>
        </div>
        <div class="bg-white rounded border border-gray-200 p-3">
          <div class="text-xs text-gray-500">総打刻数</div>
          <div id="cardPunchCount" class="text-xl font-bold">—</div>
        </div>
        <div class="bg-white rounded border border-gray-200 p-3">
          <div class="text-xs text-gray-500">未退勤(要対応)</div>
          <div id="cardMissingOut" class="text-xl font-bold text-yellow-700">—</div>
        </div>
        <div class="bg-white rounded border border-gray-200 p-3">
          <div class="text-xs text-gray-500">合計実働(簡易)</div>
          <div id="cardTotalHours" class="text-xl font-bold">—</div>
        </div>
      </div>

      <div class="bg-white rounded border border-gray-200 overflow-auto" style="max-height:60vh;">
        <table class="matrix-table w-full" id="matrix"></table>
      </div>

      <p class="text-xs text-gray-500 mt-3">
        ※ 実働時間は (退勤 − 出勤 − 休憩) で算出（休憩は休憩開始/終了の打刻ペアから集計）。<br>
        ※ 未退勤(黄)は打刻漏れの可能性。<code>/admin</code> から修正（manager/office）。
      </p>
    </main>
    ${renderBottomNav('/period', me.role)}
  `;

  document.getElementById('prevBtn').onclick = () => changePeriod(-1);
  document.getElementById('nextBtn').onclick = () => changePeriod(1);
  document.getElementById('todayBtn').onclick = () => { currentKey = currentPeriodKey(); refresh(); };
  document.getElementById('csvBtn').onclick = exportCsv;

  function changePeriod(delta) {
    const [y, m, h] = currentKey.split('-');
    let year = Number(y), month = Number(m), half = h === 'H1' ? 1 : 2;
    half += delta;
    if (half > 2) { half = 1; month++; if (month > 12) { month = 1; year++; } }
    if (half < 1) { half = 2; month--; if (month < 1) { month = 12; year--; } }
    currentKey = `${year}-${String(month).padStart(2,'0')}-H${half}`;
    refresh();
  }

  function refresh() {
    const url = new URL(location.href);
    url.searchParams.set('period', currentKey);
    history.replaceState(null, '', url);
    loadData();
  }

  let employees = {}, punches = [];
  let unsubPunches = null;

  onValue(ref(db, 'employees'), (snap) => { employees = snap.val() || {}; render(); });

  function loadData() {
    if (unsubPunches) unsubPunches();
    const q = query(ref(db, 'punches'), orderByChild('periodKey'), equalTo(currentKey));
    unsubPunches = onValue(q, (snap) => {
      const arr = [];
      snap.forEach(c => { arr.push({ id: c.key, ...c.val() }); return false; });
      punches = arr; render();
    });
  }
  loadData();

  function render() {
    const [startDate, endDate] = periodRange(currentKey);
    document.getElementById('periodLabel').textContent = `${startDate} 〜 ${endDate}`;
    const days = [];
    const start = new Date(startDate), end = new Date(endDate);
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      days.push({ key: `${y}-${m}-${dd}`, day: d.getDate(), weekday: d.getDay() });
    }
    const emps = Object.keys(employees)
      .map(id => ({ id, ...employees[id] }))
      .filter(e => e.active !== false && e.name)
      .sort((a, b) => (a.workNo || 0) - (b.workNo || 0));
    // matrix[empId][dateKey] = punches[]
    const matrix = {};
    for (const p of punches) {
      if (!matrix[p.employeeId]) matrix[p.employeeId] = {};
      if (!matrix[p.employeeId][p.dateKey]) matrix[p.employeeId][p.dateKey] = [];
      matrix[p.employeeId][p.dateKey].push(p);
    }
    let missingOut = 0, totalHours = 0;
    for (const emp of emps) {
      for (const day of days) {
        const ps = matrix[emp.id]?.[day.key];
        if (!ps || ps.length === 0) continue;
        const c = computeWorkHours(ps);
        if (c.hasIn && !c.hasOut) missingOut++;
        if (c.hasIn && c.hasOut) totalHours += msToHours(c.workMs);
      }
    }
    document.getElementById('cardEmpCount').textContent = emps.length;
    document.getElementById('cardPunchCount').textContent = punches.length;
    document.getElementById('cardMissingOut').textContent = missingOut;
    document.getElementById('cardTotalHours').textContent = totalHours.toFixed(1) + 'h';

    const weekdayLabel = ['日','月','火','水','木','金','土'];
    const headerRow = `
      <thead>
        <tr>
          <th class="corner bg-gray-50 text-left" style="min-width:140px;">氏名 / 部門</th>
          ${days.map(d => {
            const cls = d.weekday === 0 ? 'cell-sunday' : (d.weekday === 6 ? 'cell-saturday' : '');
            return `<th class="${cls}">${d.day}<br><span class="text-gray-500 font-normal">${weekdayLabel[d.weekday]}</span></th>`;
          }).join('')}
          <th class="bg-gray-50" style="min-width:60px;">日数</th>
          <th class="bg-gray-50" style="min-width:60px;">実働h</th>
        </tr>
      </thead>`;
    const bodyRows = emps.map(emp => {
      let empDays = 0, empHours = 0;
      const cells = days.map(d => {
        const ps = matrix[emp.id]?.[d.key];
        if (!ps || ps.length === 0) {
          const wkCls = d.weekday === 0 ? 'cell-sunday' : (d.weekday === 6 ? 'cell-saturday' : '');
          return `<td class="${wkCls} cell-missing text-center">—</td>`;
        }
        const c = computeWorkHours(ps);
        let cls = 'cell-present', text = '';
        if (c.hasIn && c.hasOut) {
          const hrs = msToHours(c.workMs);
          empHours += hrs; empDays++;
          const extra = c.breakMs ? `<div class="text-[10px] text-gray-500">休${msToHours(c.breakMs).toFixed(1)}h</div>` : '';
          text = `<div class="text-[11px]">${fmtHHmm(c.firstIn)}</div><div class="text-[11px] text-gray-600">${fmtHHmm(c.lastOut)}</div>${extra}`;
        } else if (c.hasIn) { cls = 'cell-warn'; text = `<div class="text-[11px]">${fmtHHmm(c.firstIn)}</div><div class="text-[11px] text-yellow-700">出のみ</div>`; }
        else if (c.hasOut)   { cls = 'cell-warn'; text = `<div class="text-[11px] text-yellow-700">退のみ</div><div class="text-[11px]">${fmtHHmm(c.lastOut)}</div>`; }
        return `<td class="${cls} text-center">${text}</td>`;
      }).join('');
      return `
        <tr>
          <th>
            <div class="font-bold">${escapeHtml(emp.name)}</div>
            <div class="text-[10px] text-gray-500">${escapeHtml(emp.dept || '')}</div>
          </th>
          ${cells}
          <td class="text-center font-bold tabular-nums">${empDays}</td>
          <td class="text-center font-bold tabular-nums">${empHours.toFixed(1)}</td>
        </tr>`;
    }).join('');
    document.getElementById('matrix').innerHTML = headerRow + '<tbody>' + bodyRows + '</tbody>';
  }

  function exportCsv() {
    const [startDate, endDate] = periodRange(currentKey);
    const days = [];
    const start = new Date(startDate), end = new Date(endDate);
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      days.push(`${y}-${m}-${dd}`);
    }
    const emps = Object.keys(employees).map(id => ({ id, ...employees[id] }))
      .filter(e => e.active !== false && e.name)
      .sort((a, b) => (a.workNo || 0) - (b.workNo || 0));
    const matrix = {};
    for (const p of punches) {
      if (!matrix[p.employeeId]) matrix[p.employeeId] = {};
      if (!matrix[p.employeeId][p.dateKey]) matrix[p.employeeId][p.dateKey] = [];
      matrix[p.employeeId][p.dateKey].push(p);
    }
    const rows = [['社員ID','氏名','部門','日付','曜日','出勤','退勤','休憩h','実働h','備考']];
    const wlabel = ['日','月','火','水','木','金','土'];
    for (const emp of emps) {
      for (const dateKey of days) {
        const ps = matrix[emp.id]?.[dateKey];
        const wd = new Date(dateKey).getDay();
        if (!ps || ps.length === 0) { rows.push([emp.id, emp.name, emp.dept||'', dateKey, wlabel[wd], '', '', '', '', '']); continue; }
        const c = computeWorkHours(ps);
        let hrs = '', note = '';
        if (c.hasIn && c.hasOut) hrs = msToHours(c.workMs).toFixed(2);
        else if (c.hasIn)  note = '退勤打刻なし';
        else if (c.hasOut) note = '出勤打刻なし';
        rows.push([emp.id, emp.name, emp.dept||'', dateKey, wlabel[wd],
          c.firstIn ? fmtHHmm(c.firstIn) : '', c.lastOut ? fmtHHmm(c.lastOut) : '',
          msToHours(c.breakMs).toFixed(2),
          hrs, note]);
      }
    }
    const csv = '﻿' + rows.map(r => r.map(c => {
      const s = String(c ?? '');
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }).join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `timecard_${currentKey}.csv`; a.click();
    URL.revokeObjectURL(url);
    showFlash(`CSV出力: ${currentKey}`);
  }
</script>
</body>
</html>
