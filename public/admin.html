<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>打刻管理 - みんなの出勤簿</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen pb-20">
<div id="app" class="max-w-5xl mx-auto px-4 py-4"></div>

<script type="module">
  import {
    db, ref, onValue, push, set, remove, get, query, orderByChild, equalTo,
    serverTimestamp, periodKeyFromDate, dateKeyJST, fmtHHmm, fmtHHmmss, escapeHtml
  } from '/js/firebase-init.js';
  import { requireRole } from '/js/auth-guard.js';
  import { renderHeader, renderBottomNav, showFlash } from '/js/layout.js';

  const me = await requireRole(['manager','office']);
  if (!me) throw new Error('blocked');

  const urlParams = new URLSearchParams(location.search);
  let selectedEmp = urlParams.get('emp') || '';
  let selectedDate = urlParams.get('date') || dateKeyJST();

  document.getElementById('app').innerHTML = `
    ${renderHeader('🔧 打刻管理')}
    <div class="bg-white border border-gray-200 rounded-xl p-4 my-4">
      <div class="flex items-center gap-3 flex-wrap">
        <label class="text-sm">社員:
          <select id="empSelect" class="ml-1 p-2 border rounded bg-white"></select>
        </label>
        <label class="text-sm">日付:
          <input type="date" id="dateInput" value="${selectedDate}" class="ml-1 p-2 border rounded">
        </label>
        <button id="addBtn" class="ml-auto px-3 py-2 bg-blue-600 text-white rounded text-sm font-bold hover:bg-blue-700">+ 打刻を追加</button>
      </div>
    </div>

    <div id="punchList" class="bg-white border border-gray-200 rounded-xl p-4 mb-4">
      <div class="text-gray-400 text-center py-4">読み込み中…</div>
    </div>

    <details class="bg-white border border-gray-200 rounded-xl p-4">
      <summary class="cursor-pointer font-bold">修正履歴（editLogs）最新30件</summary>
      <div id="editLogs" class="mt-3 text-sm"></div>
    </details>

    <div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
      <div class="bg-white rounded-xl p-5 w-full max-w-md m-4">
        <h2 id="modalTitle" class="font-bold text-lg mb-3">打刻を追加</h2>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-bold mb-1">種別</label>
            <select id="mType" class="w-full p-2 border rounded">
              <option value="in">出勤</option>
              <option value="out">退勤</option>
              <option value="break_start">休憩開始</option>
              <option value="break_end">休憩終了</option>
              <option value="leave_start">一時退出</option>
              <option value="leave_end">戻り</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">日時</label>
            <input type="datetime-local" id="mDateTime" class="w-full p-2 border rounded">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">理由（必須）</label>
            <input type="text" id="mReason" placeholder="例: 退勤打刻漏れ(本人申告)" class="w-full p-2 border rounded">
          </div>
          <div class="flex gap-2 justify-end pt-2">
            <button id="mCancel" class="px-4 py-2 border rounded">キャンセル</button>
            <button id="mSave" class="px-4 py-2 bg-blue-600 text-white rounded font-bold">保存</button>
          </div>
        </div>
      </div>
    </div>
    ${renderBottomNav('/admin', me.role)}
  `;

  // 社員リスト
  let employees = {};
  onValue(ref(db, 'employees'), (snap) => {
    employees = snap.val() || {};
    const sel = document.getElementById('empSelect');
    const list = Object.keys(employees).map(id => ({ id, ...employees[id] }))
      .filter(e => e.active !== false && e.name)
      .sort((a, b) => (a.workNo || 0) - (b.workNo || 0));
    sel.innerHTML = '<option value="">— 選択 —</option>' +
      list.map(e => `<option value="${e.id}" ${selectedEmp === e.id ? 'selected' : ''}>${escapeHtml(e.name)}（${escapeHtml(e.dept || '')}）</option>`).join('');
    sel.onchange = () => { selectedEmp = sel.value; syncUrl(); loadPunches(); };
    loadPunches();
  });

  document.getElementById('dateInput').onchange = (e) => {
    selectedDate = e.target.value; syncUrl(); loadPunches();
  };

  function syncUrl() {
    const url = new URL(location.href);
    if (selectedEmp) url.searchParams.set('emp', selectedEmp); else url.searchParams.delete('emp');
    if (selectedDate) url.searchParams.set('date', selectedDate);
    history.replaceState(null, '', url);
  }

  let unsubPunches = null, currentPunches = [];
  function loadPunches() {
    const listEl = document.getElementById('punchList');
    if (!selectedEmp || !selectedDate) {
      listEl.innerHTML = '<div class="text-gray-400 text-center py-4">社員と日付を選択してください</div>';
      return;
    }
    listEl.innerHTML = '<div class="text-gray-400 text-center py-4">読み込み中…</div>';
    if (unsubPunches) unsubPunches();
    const q = query(ref(db, 'punches'), orderByChild('employeeId'), equalTo(selectedEmp));
    unsubPunches = onValue(q, (snap) => {
      const arr = [];
      snap.forEach(c => { arr.push({ id: c.key, ...c.val() }); return false; });
      currentPunches = arr.filter(p => p.dateKey === selectedDate).sort((a, b) => a.timestamp - b.timestamp);
      renderPunches();
    });
  }

  function renderPunches() {
    const listEl = document.getElementById('punchList');
    if (currentPunches.length === 0) {
      listEl.innerHTML = '<div class="text-gray-400 text-center py-4">この日の打刻はありません</div>';
      return;
    }
    const TYPE_LABEL = { in:'出勤', out:'退勤', break_start:'休憩開始', break_end:'休憩終了', leave_start:'一時退出', leave_end:'戻り' };
    const TYPE_PILL  = { in:'bg-green-100 text-green-800', out:'bg-red-100 text-red-800',
                          break_start:'bg-amber-100 text-amber-800', break_end:'bg-amber-50 text-amber-700',
                          leave_start:'bg-indigo-100 text-indigo-800', leave_end:'bg-indigo-50 text-indigo-700' };
    listEl.innerHTML = `
      <div class="text-xs font-bold text-gray-500 mb-2">${selectedDate} の打刻 (${currentPunches.length}件)</div>
      ${currentPunches.map(p => `
        <div class="flex items-center justify-between border-b border-gray-100 last:border-0 py-2 gap-2">
          <div class="flex items-center gap-3 flex-1 min-w-0">
            <span class="text-xs px-2 py-0.5 rounded ${TYPE_PILL[p.type] || 'bg-gray-100 text-gray-700'}">
              ${TYPE_LABEL[p.type] || p.type}
            </span>
            <span class="tabular-nums font-mono">${fmtHHmmss(p.timestamp)}</span>
            <span class="text-xs text-gray-500 truncate">${escapeHtml(p.deviceLabel || (p.deviceUid||'').slice(0,8))}</span>
          </div>
          <button data-edit="${p.id}"   class="text-xs text-blue-600 hover:underline">編集</button>
          <button data-delete="${p.id}" class="text-xs text-red-600 hover:underline">削除</button>
        </div>
      `).join('')}
    `;
    listEl.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openEdit(b.dataset.edit));
    listEl.querySelectorAll('[data-delete]').forEach(b => b.onclick = () => deletePunch(b.dataset.delete));
  }

  const modal = document.getElementById('modal');
  document.getElementById('mCancel').onclick = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };
  document.getElementById('addBtn').onclick = openAdd;

  let editingId = null;

  function openAdd() {
    if (!selectedEmp || !selectedDate) { showFlash('社員と日付を選択してください', 'err'); return; }
    editingId = null;
    document.getElementById('modalTitle').textContent = '打刻を追加';
    document.getElementById('mType').value = 'in';
    document.getElementById('mDateTime').value = `${selectedDate}T17:00`;
    document.getElementById('mReason').value = '';
    modal.classList.remove('hidden'); modal.classList.add('flex');
  }

  function openEdit(id) {
    const p = currentPunches.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = '打刻を修正';
    document.getElementById('mType').value = p.type;
    const d = new Date(p.timestamp);
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('mDateTime').value =
      `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    document.getElementById('mReason').value = '';
    modal.classList.remove('hidden'); modal.classList.add('flex');
  }

  document.getElementById('mSave').onclick = async () => {
    const type = document.getElementById('mType').value;
    const dtStr = document.getElementById('mDateTime').value;
    const reason = document.getElementById('mReason').value.trim();
    if (!dtStr)  { showFlash('日時を入力してください', 'err'); return; }
    if (!reason) { showFlash('理由を必ず記入してください', 'err'); return; }
    const dt = new Date(dtStr);
    const ts = dt.getTime();
    const dateKey = dtStr.slice(0, 10);
    const periodKey = periodKeyFromDate(dateKey);
    const emp = employees[selectedEmp];
    if (!emp) { showFlash('社員データエラー', 'err'); return; }
    const payload = {
      employeeId: selectedEmp, employeeName: emp.name, employeeDept: emp.dept || '',
      type, timestamp: ts, dateKey, periodKey,
      deviceUid: me.id, deviceLabel: '管理画面(修正)'
    };
    try {
      if (editingId) {
        const before = currentPunches.find(x => x.id === editingId);
        await push(ref(db, 'editLogs'), {
          targetPunchId: editingId,
          beforeValue: before, afterValue: payload, reason,
          editedBy: me.id, editedByEmail: me.email || '',
          editedAt: serverTimestamp()
        });
        await remove(ref(db, `punches/${editingId}`));
        const newRef = await push(ref(db, 'punches'), payload);
        showFlash(`修正完了 (新ID: ${newRef.key.slice(0,8)})`);
      } else {
        const newRef = await push(ref(db, 'punches'), payload);
        await push(ref(db, 'editLogs'), {
          targetPunchId: newRef.key,
          beforeValue: null, afterValue: payload,
          reason: `[追加] ${reason}`,
          editedBy: me.id, editedByEmail: me.email || '',
          editedAt: serverTimestamp()
        });
        showFlash('追加完了');
      }
      modal.classList.add('hidden'); modal.classList.remove('flex');
    } catch (e) {
      showFlash('エラー: ' + e.message, 'err');
    }
  };

  async function deletePunch(id) {
    const p = currentPunches.find(x => x.id === id);
    if (!p) return;
    const reason = prompt(`この打刻を削除します。理由を入力してください:\n${p.type === 'in' ? '出勤' : '退勤'} ${fmtHHmmss(p.timestamp)}`);
    if (!reason) return;
    try {
      await push(ref(db, 'editLogs'), {
        targetPunchId: id, beforeValue: p, afterValue: null,
        reason: `[削除] ${reason}`,
        editedBy: me.id, editedByEmail: me.email || '',
        editedAt: serverTimestamp()
      });
      await remove(ref(db, `punches/${id}`));
      showFlash('削除完了');
    } catch (e) { showFlash('エラー: ' + e.message, 'err'); }
  }

  onValue(ref(db, 'editLogs'), (snap) => {
    const arr = [];
    snap.forEach(c => { arr.push({ id: c.key, ...c.val() }); return false; });
    arr.sort((a, b) => (b.editedAt || 0) - (a.editedAt || 0));
    const recent = arr.slice(0, 30);
    const el = document.getElementById('editLogs');
    if (recent.length === 0) {
      el.innerHTML = '<div class="text-gray-400">修正履歴はありません</div>';
      return;
    }
    el.innerHTML = recent.map(log => {
      const when = log.editedAt ? new Date(log.editedAt).toLocaleString('ja-JP') : '';
      const empName = log.afterValue?.employeeName || log.beforeValue?.employeeName || '';
      const action = !log.beforeValue ? '追加' : (!log.afterValue ? '削除' : '修正');
      return `
        <div class="border-b border-gray-100 py-2">
          <div class="text-xs text-gray-500">${when} / ${escapeHtml(log.editedByEmail || (log.editedBy||'').slice(0,8))}</div>
          <div class="font-medium">${escapeHtml(empName)} — ${action}</div>
          <div class="text-gray-600 text-xs">${escapeHtml(log.reason || '')}</div>
        </div>`;
    }).join('');
  });
</script>
</body>
</html>
